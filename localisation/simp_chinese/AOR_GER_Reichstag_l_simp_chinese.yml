 GER_Reichstag_spd_left_tt: "§tSPD左翼§!\n社会民主党内最激进的一翼，强调工人委员会、社会化改革与共和国的群众基础。\n\n代表人物：§Y罗莎·卢森堡§!、§Y卡尔·李卜克内西§!"
 GER_Reichstag_spd_center_left_tt: "§RSPD中左派§!\n支持议会道路下的劳工保护、福利扩张和有限社会化，倾向同工会保持紧密关系。\n\n代表人物：§Y奥古斯特·倍倍尔§!、§Y鲁道夫·希法亭§!"
 GER_Reichstag_spd_center_right_tt: "§rSPD中右派§!\n共和国政府的主要执政骨干，重视秩序、财政稳定与渐进改革。\n\n代表人物：§Y弗里德里希·艾伯特§!、§Y奥托·威尔斯§!"
 GER_Reichstag_spd_right_tt: "§OSPD右翼§!\n社会民主党内最温和的一翼，愿意与自由派和中间派合作，优先维护共和国制度。\n\n代表人物：§Y菲利普·谢德曼§!、§Y古斯塔夫·诺斯克§!"
 GER_Reichstag_zentrum_left_tt: "§g中央党左派§!\n中央党内社会天主教倾向较强的一翼，关注劳工调和、地方自治和宗教社团权益。\n\n代表人物：§Y马蒂亚斯·埃茨贝格尔§!"
 GER_Reichstag_zentrum_center_tt: "§Y中央党中派§!\n中央党的主流议会派，强调联邦妥协、教会利益与共和国稳定。\n\n代表人物：§Y威廉·马克思§!"
 GER_Reichstag_zentrum_right_tt: "§7中央党右派§!\n中央党内偏保守的一翼，重视秩序、地方传统和对激进社会主义的防范。\n\n代表人物：§Y康斯坦丁·费伦巴赫§!"
 GER_Reichstag_ddp_tt: "§P德意志民主党§!\n自由主义共和国派，支持宪政、法治、现代教育和中产阶级政治参与。\n\n代表人物：§Y瓦尔特·拉特瑙§!、§Y雨果·普罗伊斯§!"
 GER_Reichstag_dvp_tt: "§B德意志人民党§!\n民族自由主义与工商界利益的代表，强调经济恢复、秩序和现实主义外交。\n\n代表人物：§Y古斯塔夫·施特雷泽曼§!"
 GER_Reichstag_far_right_tt: "§L极右翼联盟§!\n由民族主义者、保皇派和反共和国团体组成的松散阵线，反对左翼扩张与共和妥协。\n\n代表人物：§Y阿尔弗雷德·胡根贝格§!、§Y埃里希·鲁登道夫§!"
