 AOR_GER_International.1.t:0 "一九一九柏林国际"
 AOR_GER_International.1.desc:0 "虽然是一场不流血的革命，但是柏林依旧没有从中恢复过来。\n\n普鲁士众议院内的帝国徽记还都在拆除过程中，刚打扫出来的会议室也来不及做更多装饰了。来自世界各国的代表团正在陆续抵达莱比锡大街，人们在众议院门前，争论声几乎没有停过。\n\n卡尔·考茨基还一路都在说话。\n\n“问题首先还是战争责任。”他慢慢向前走着，语气认真得近乎固执，“法国人不会轻易接受德国社会民主党的解释，奥地利人更不会给我们好脸色看。谁都不愿意先承认自己的错误。”\n\n倍倍尔没有看他。“他们总得坐下来谈。”\n\n“谈是一回事，重新建立国际是另一回事。”考茨基忍不住举起双手，在空中胡乱比划着，“一九一四年之后，所有人都开始怀疑，社会主义政党究竟还能不能超越民族国家：无论欧洲的哪个社会主义政党在当年都或多或少支持了战争。还有俄国的问题，布尔什维克认为议会制度已经过时，认为工人政党只需要暴力革命，依靠苏维埃就能统治国家——但这无非就是布朗基主义的那些东西。”\n\n“嗯，你最好别当着他们的人这么说。”倍倍尔随口道。\n\n“我已经写过了。”\n\n“所以他们才讨厌你。”\n\n考茨基像是没听见一样。\n\n今天来到柏林的社会主义者，大致分成三个派别。\n\n最多是那些社会沙文主义者，支持在战争时期与本国政府合作。他们认为社会主义政党首先必须维护国家秩序，阶级斗争不能危及民族共同体。这些人大多来自旧第二国际右派，也包括不少工会官员和议会领袖。\n\n另一部分人则继承了齐美瓦尔德左派的立场。他们认为世界大战已经证明旧社会民主主义彻底失败，议会道路只是对资产阶级的妥协。在他们看来，俄国革命至少真正进行了革命。\n\n至于中间派……这里就有俩。\n\n倍倍尔停下脚步，看了考茨基一眼。“你最好别在开幕式上讲太久。”\n\n考茨基皱了皱眉。“有些事情总得说清楚，不然国际根本无法重建。”\n\n“以后再说。”\n\n两人一同走上台阶，推开了那扇门。"
 AOR_GER_International.1.a:0 "但愿一切顺利。"
 AOR_GER_International.1.tt:0 "§g在柏林会议上，战争责任、布尔什维克政权、米勒兰事件等问题都将被摆上桌面。请注意平衡§C社会沙文主义者§g与§R齐美尔瓦尔德左派§g的声势，否则重组第二国际的计划只能泡汤。当然，即便成功，恐怕也只能惨淡收场：代表们已经吵上天了。§!\n\n§Y德国§!将建立§R社会主义工人国际（柏林国际）§!势力范围。"
